services:
  # MQTT Decoder - zbiera dane z MQTT i zapisuje do bazy
  mqtt-decoder:
    build: .
    image: mesh-scout:latest
    container_name: mesh-scout-decoder
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./config.json:/app/config.json:ro
    environment:
      - TZ=Europe/Warsaw
      - DB_PATH=/data/mesh_scout.db
      - PYTHONUNBUFFERED=1
    command: ["python", "meshtastic_mqtt_decoder.py", "--config", "/app/config.json"]
    networks:
      - mesh-scout
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Web Server - wyświetla urządzenia na mapie
  web-server:
    build: .
    image: mesh-scout:latest
    container_name: mesh-scout-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    environment:
      - TZ=Europe/Warsaw
      - DB_PATH=/data/mesh_scout.db
      - PORT=5000
      - DEBUG=False
      - PYTHONUNBUFFERED=1
    command: ["python", "web_server.py"]
    depends_on:
      - mqtt-decoder
    networks:
      - mesh-scout
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Opcjonalnie: własny broker MQTT
  # mosquitto:
